# Precedent
precedent_heading: "Гэта больш чым Android"
precedent_pullquote: "Калі Google можа адным днём заблакіраваць мільярды прылад, што прадаваліся як свабодныя плафтормы, кожны вырабнік прылад возьме прыклад."
precedent_p1: "Задаецца прынцып: **кампанія, якая зрабіла вашу прыладу, вырашае пасля таго, як вы яе набылі, якое праграмнае забеспячэнне вам дазволена запускаць.** У праграмным забеспячэнні гэта называецца “выцягванне дывана”; але, па меншай меры, вы заўсёды можаце ўсталяваць канкуруючае праграмнае забеспячэнне. Што датычыцца апаратнага забеспячэння, гэта *здзейснены факт*, які пазбаўляе вас паўнамоцтваў і робіць вас бяссільнымі перад капрызамі аднаго непадсправаздачнага брамніка і асуджанага манапаліста."
precedent_p2: "Адкрытасць Android ніколі не была проста функцыяй. Гэта *абяцанне*, якое адрознівала яго ад iPhone. Мільёны выбралі Android менавіта па гэтай прычыне. Цяпер Google адклікае гэтае абяцанне ў аднабаковым парадку на прыладах, якія *ўжо* знаходзяцца ў кішэнях людзей, таму што яны вырашылі, што ў іх дастаткова дамінавання на рынку і нарматыўнага захопу, каб сысці з рук."
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"Зайздросць Google Apple пагражае знічышць адкрытую спадчыну Android."

# Objections
objections_heading: "Пачакайце, а гэта ..."
obj_security_q: "\"...проста пра бяспеку?\""
obj_security_a: "Абгрунтаванне бяспекі - дымавая заслона. Google Play Protect ужо шукае шкодныя праграмы незалежна ад асобы распрацоўшчыка. Патрабаванне дзяржаўнага пасведчання асобы не робіць код больш бяспечным. Гэта робіць *распрацоўшчыкаў* ідэнтыфікаванымі і кантраляванымі. Аўтары шкоднасных праграм могуць зарэгістравацца. Незалежныя распрацоўшчыкі і дысідэнты часта не могуць. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) кажа: абмежаванне на аснове ідэнтыфікацыйных дадзеных з'яўляецца інструментам цэнзуры, а не інструментам бяспекі."
obj_sideloading_q: "\"...усё яшчэ загрузка пабочных праграм у экспертным рэжыме, хіба не?\""
obj_sideloading_a: "Дзевяць крокаў, 24-гадзіннае чаканне, схаваныя ў Параметрах распрацоўшчыка, дастаўленыя праз прапрыетарны сэрвіс, які Google можа адклікаць, калі захоча. Гэта не загрузка пабочных праграм. Гэта **механізм стрымлівання**, створаны для таго, каб амаль ніхто яго не завяршыў. І паколькі ён працуе праз Play Services, а не праз АС, Google можа зрабіць яго ціхім або забіць."
obj_hide_q: "\"...праблема для тых, хто нічога не хавае?\""
obj_hide_a: "Першымі ахвярамі стануць інфарматары, журналісты і актывісты пры аўтарытарных урадах. На наступным месцы людзі, якія трапілі ў сямейны гвалт. Усе гэтыя групы маюць законныя падставы распаўсюджваць або выкарыстоўваць праграмнае забеспячэнне без размяшчэння сваёй юрыдычнай асобы ў базе дадзеных Google. Ананімны ўклад з адкрытым зыходным кодам - ​​гэта традыцыя, старэйшая за сам Google. Гэта палітыка спыняе гэта на Android."
obj_apple_q: "\"...не тое ж самае, што робіць Apple?\""
obj_apple_a: "Apple з першага дня была агароджаным садам. Людзі выбіралі Android, *таму што ён быў іншым*. "Apple таксама робіць гэта" - гэта гонка на дно і слабы аргумент *tu quoque*. І пад нарматыўным ціскам (Закон ЕС аб ​​лічбавых рынках) нават Apple вымушана адкрыцца. Google рухаецца ў адваротным кірунку: спрабуе яшчэ больш умацаваць свой статус гейткіпера."
obj_cost_q: "\"...проста $25 і крыху працы з паперамі?\""
obj_cost_a: "Магчыма, калі вы распрацоўшчык у ЗША з крэдытнай карткай і вадзіцельскімі правамі. Паспрабуйце быць студэнтам у Афрыцы на поўдзень ад Сахары, або дысідэнтам у М'янме, або добраахвотнікам, які падтрымлівае праграму для аховы здароўя супольнасці. Кошт не толькі фінансавы: вы перадаеце дзяржаўнае пасведчанне асобы і доказы вашых ключоў подпісу кампаніі, якая [рэгулярна выконвае](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) патрабаванні ўрада выдаляць праграмы і раскрываць распрацоўшчыкаў."

