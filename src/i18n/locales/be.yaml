# What Google is doing
what_heading: "Што робіць Google"
what_intro: "У жніўні 2025, Google [анасаваў](https://developer.android.com/developer-verification) нвоае патрабаванне: пачынаючы з верасня 2026, **кожны распрацоўшчык праграм Android павінен рэгістрыравацца ў Google** перад тым, як ягоны софт зможа быць усталяваны. Не толькі праграмы Play Store: усе. Гэта ўключае праграмы, распаўсюджаныя паміж сябрамі, распаўсюджаныя з дапамогай [F-Droid](https://f-droid.org), створаныя для асобнага карыстання. Незалежныя распрацоўшчыкі, цэрквы, супольнасці і энтузіясты, верагодна, страцяць магчымасць распрацоўваць свае праграмы."
what_registration: "Рэгістрацыя патрабуе:"
what_req_fee: "Заплаціць унёсак Google"
what_req_terms: "Пагадзіцца на Умовы і Палітыкі Google"
what_req_id: "Прадастаўленне дакументаў дзяржанага прыклада"
what_req_signing: "Прадстаўленне доказаў уладання прыватным ключом распрацоўшчыка"
what_req_appids: "Пералічэнне ўсіх дзейных і будучых ідэнтыфікатараў праграмы"
what_pullquote: "А калі распрацоўшчык не пагадзіцца, іх праграма будзе сусветна ціха заблакіравана на кожнай прыладзе Android."

# Who this hurts
impact_heading: "Каму гэта шкодзіць?"
impact_you_heading: "Вам"
impact_you_p1: "Вы купілі тэлефон на Android, бо Google казаў, што ён адкрыты. Вы павінны устанаўліваць што хаціце і такой была здзелка."
impact_you_p2: "Google цяпер перапісвае яе на зябеспячэнні, што ўжо ў вас ёсць. Пасля прымянення абнаўлення, вы зможаце запускаць праграмы, якія зацвердзіў Google. На вашым тэлефоне: <i>ваша</i> маёмасць, за якую <i>вы</i> заплацілі"
impact_dev_heading: "Незалежным распрацоўшчыкам"
impact_dev_p1: "Першая праграма падлетка, інструмент для прыватнасці для актывіста ці унутраная бэта вялікай кампаніі. Гэта не мае значэння. Пасля верасня 2026, нічога з гэтага не зможа быць усталявана без дазволу Google."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), дом для тысяч бясплатных і адкрытых праграм Android ужо назваў гэта ["пагрозай выжывання"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Коры Дактароў назваў гэта ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
impact_gov_heading: "Урадам і цывілізаванай супольнасці"
impact_gov_p1: "Google мае [задакументаваныя выпадкі](https://www.aclu.org/news/free-speech/app-store-oligopoly) падчынення аўтарытарным рэжымам і выдалення праграм. Такім чынам, праграмы інстытутаў у вашай краіне будуць існаваць па дазволу адной некантралюемай замежнай карпарацыі."
impact_gov_p2: >-
  [EFF назваў](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) такія меры "сцежкай да пашырэння інтэрнэт-цэнзуры."

